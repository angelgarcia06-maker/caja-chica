<div class="dashboard">
  <header class="header">
    <div class="header-content">
      <h1>Lista de Usuarios</h1>
      <div class="header-actions">
        <button class="btn-nav" (click)="irARegistro()">Registrar Usuario</button>
        <button class="btn-nav" (click)="irADashboard()">Caja Chica</button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <section class="tabla-section">
      <h2>Usuarios Registrados</h2>

      <div class="cargando" *ngIf="cargando">Cargando usuarios...</div>
      <div class="error-msg" *ngIf="error">{{ error }}</div>

      <div class="sin-datos" *ngIf="!cargando && usuarios.length === 0">
        No hay usuarios registrados.
      </div>

      <table *ngIf="!cargando && usuarios.length > 0">
        <thead>
          <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Rol</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let usuario of usuarios">
            <td>{{ usuario.id }}</td>
            <td>{{ usuario.username }}</td>
            <td>
              <span class="badge" [class.badge-admin]="usuario.rol === 'ADMIN'"
                    [class.badge-empleado]="usuario.rol === 'EMPLEADO'">
                {{ usuario.rol }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <footer class="footer">
    <p>Sistema de Control y Auditoría de Gastos de Caja Chica &copy; 2026</p>
  </footer>
</div>
