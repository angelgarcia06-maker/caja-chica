<div class="dashboard">
  <header class="header">
    <div class="header-content">
      <h1>Registro de Usuarios</h1>
      <div class="header-actions">
        <button class="btn-nav" (click)="irALista()">Ver Usuarios</button>
        <button class="btn-nav" (click)="irADashboard()">Caja Chica</button>
        <button class="btn-logout" (click)="irADashboard()">Salir</button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <section class="form-section">
      <h2>Nuevo Usuario</h2>

      <div class="form-group">
        <label for="username">Nombre de Usuario</label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          placeholder="Ej: juan123"
          (blur)="validarUsername()"
          (input)="validarUsername()"
        />
        <span class="field-error" *ngIf="usernameError">{{ usernameError }}</span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          placeholder="Mínimo 3 caracteres"
          (blur)="validarPassword()"
          (input)="validarPassword()"
        />
        <span class="field-error" *ngIf="passwordError">{{ passwordError }}</span>
      </div>

      <div class="form-group">
        <label for="rol">Rol</label>
        <select id="rol" [(ngModel)]="rol" (change)="onRolChange()">
          <option value="EMPLEADO">Empleado</option>
          <option value="ADMIN">Administrador</option>
        </select>
      </div>

      <div class="error-msg" *ngIf="error">{{ error }}</div>
      <div class="exito-msg" *ngIf="exito">{{ exito }}</div>

      <button class="btn-crear" (click)="registrar()" [disabled]="cargando">
        {{ cargando ? 'Registrando...' : 'Registrar Usuario' }}
      </button>
    </section>
  </main>

  <footer class="footer">
    <p>Sistema de Control y Auditoría de Gastos de Caja Chica &copy; 2026</p>
  </footer>
</div>
