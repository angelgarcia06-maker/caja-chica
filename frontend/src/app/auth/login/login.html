<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <h1>Caja Chica</h1>
      <p>Sistema de Control de Gastos en Caja chica</p>
    </div>

    <div class="login-body">

      <div class="form-group">
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          placeholder="Ingresa tu usuario"
          (blur)="validarUsername()"
          (keyup.enter)="login()"
        />
        <span class="field-error" *ngIf="usernameError">{{ usernameError }}</span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-password">
          <input
            [type]="mostrarPassword ? 'text' : 'password'"
            id="password"
            [(ngModel)]="password"
            placeholder="Ingresa tu contraseña"
            (blur)="validarPassword()"
            (keyup.enter)="login()"
          />
          <button type="button" class="btn-toggle-pass" (click)="togglePassword()">
            {{ mostrarPassword ? 'Ocultar' : 'Ver' }}
          </button>
        </div>
        <span class="field-error" *ngIf="passwordError">{{ passwordError }}</span>
      </div>

      <div class="error-msg" *ngIf="error">{{ error }}</div>

      <button class="btn-login" (click)="login()" [disabled]="cargando">
        {{ cargando ? 'Ingresando...' : 'Iniciar Sesión' }}
      </button>

    </div>
  </div>

  <footer class="footer">
    <p>Sistema de Control y Auditoría de Gastos de Caja Chica &copy; 2026</p>
  </footer>
</div>
