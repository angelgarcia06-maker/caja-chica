<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios — Caja Chica</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

<header class="navbar">
    <span class="brand">💰 Caja Chica</span>

    <nav id="navLinks"></nav>

    <div style="display:flex;align-items:center;">
        <span class="user-info" id="userLabel"></span>
        <button class="btn-logout" onclick="cerrarSesion()">
            Salir
        </button>
    </div>
</header>

<main class="page">

    <h1 class="page-title">Gestión de Usuarios</h1>

    <!-- FORMULARIO -->
    <div class="card">

        <div class="section-header">
            <h2 id="tituloForm">Registrar Usuario</h2>
        </div>

        <div id="msgForm" class="msg ok"></div>

        <div class="form-grid">

            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input type="text"
                       id="username"
                       placeholder="Ej: jperez">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password"
                       id="password"
                       placeholder="••••••••">
            </div>

            <div class="form-group">
                <label for="rol">Rol</label>

                <select id="rol">
                    <option value="EMPLEADO">Empleado</option>
                    <option value="ADMIN">Administrador</option>
                </select>
            </div>

            <div class="form-group">
                <label for="deptoId">Departamento</label>

                <select id="deptoId">
                    <option value="">Sin departamento</option>
                </select>
            </div>

        </div>

        <div style="display:flex; gap:.75rem; flex-wrap:wrap;">

            <button class="btn btn-primary"
                    id="btnGuardarUsuario"
                    onclick="handleGuardarUsuario()">

                + Registrar Usuario

            </button>

            <button class="btn btn-secondary"
                    onclick="limpiarFormulario()">

                Limpiar

            </button>

        </div>

    </div>

    <!-- TABLA -->
    <div class="card">

        <div class="section-header">

            <h2>Usuarios Registrados</h2>

            <button class="btn btn-secondary"
                    onclick="cargarUsuarios()"
                    style="font-size:.8rem; padding:.4rem .9rem;">

                ↻ Actualizar

            </button>

        </div>

        <div id="msgTabla" class="msg error"></div>

        <div class="table-wrap">

            <table>

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Rol</th>
                        <th>Departamento</th>
                        <th>Acciones</th>
                    </tr>

                </thead>

                <tbody id="tablaUsuarios">

                    <tr>
                        <td colspan="5"
                            style="text-align:center;
                                   color:var(--texto-soft);
                                   padding:2rem;">

                            Cargando...

                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</main>

<script src="/js/api.js"></script>

<script>

    let editandoUsuarioId = null;

    // VALIDAR LOGIN
    if (!localStorage.getItem("token")) {
        window.location.href = "/login";
    }

    const ROL = localStorage.getItem("rol");

    if (ROL !== "ADMIN") {
        window.location.href = "/view/dashboard";
    }

    // USER
    document.getElementById("userLabel").textContent =
        localStorage.getItem("username") || "";

    // NAVBAR
    document.getElementById("navLinks").innerHTML = `
        <a href="/view/dashboard">Dashboard</a>
        <a href="/view/gastos">Gastos</a>
        <a href="/view/presupuesto">Presupuesto</a>
        <a href="/view/usuarios" class="active">Usuarios</a>
    `;

    // LOGOUT
    function cerrarSesion() {

        localStorage.clear();

        window.location.href = "/login";

    }

    // INIT
    async function init() {

        try {

            const deptos = await listarDepartamentos();

            document.getElementById("deptoId").innerHTML =
                `<option value="">Sin departamento</option>` +
                deptos.map(d =>
                    `<option value="${d.id}">${d.nombre}</option>`
                ).join("");

        } catch (err) {

            mostrarMsg(
                "msgTabla",
                "Error al cargar departamentos.",
                false
            );

        }

        await cargarUsuarios();

    }

    // CARGAR USUARIOS
    async function cargarUsuarios() {

        try {

            const usuarios = await listarUsuarios();

            const tbody =
                document.getElementById("tablaUsuarios");

            if (!usuarios.length) {

                tbody.innerHTML = `
                    <tr>
                        <td colspan="5"
                            style="text-align:center;
                                   color:var(--texto-soft);
                                   padding:2rem;">

                            No hay usuarios registrados

                        </td>
                    </tr>
                `;

                return;
            }

            tbody.innerHTML = usuarios.map(u => {

                const badge =
                    u.rol === "ADMIN"
                        ? `<span class="badge badge-admin">ADMIN</span>`
                        : `<span class="badge badge-empleado">EMPLEADO</span>`;

                return `
                    <tr>

                        <td style="font-family:monospace;
                                   color:var(--texto-soft);">

                            ${u.id}

                        </td>

                        <td>${u.username}</td>

                        <td>${badge}</td>

                        <td>${u.departamento?.nombre || "—"}</td>

                        <td style="display:flex; gap:.5rem;">

                            <button class="btn btn-secondary"
                                onclick='editarUsuario(${JSON.stringify({
                                    id: u.id,
                                    username: u.username,
                                    rol: u.rol,
                                    departamento: u.departamento
                                })})'>

                                Editar

                            </button>

                            <button class="btn btn-danger"
                                onclick="eliminarUsuarioUI(${u.id})">

                                Eliminar

                            </button>

                        </td>

                    </tr>
                `;

            }).join("");

        } catch (err) {

            mostrarMsg(
                "msgTabla",
                "Error al cargar usuarios.",
                false
            );

        }

    }

    // GUARDAR USUARIO
    async function handleGuardarUsuario() {

        const username =
            document.getElementById("username")
                .value.trim();

        const password =
            document.getElementById("password")
                .value.trim();

        const rol =
            document.getElementById("rol").value;

        const departamentoId =
            document.getElementById("deptoId").value;

        if (!username || !rol) {

            mostrarMsg(
                "msgForm",
                "Completa los campos requeridos",
                false
            );

            return;
        }

        try {

            // EDITAR
            if (editandoUsuarioId) {

                const datos = {
                    username,
                    rol
                };

                if (departamentoId) {

                    datos.departamento = {
                        id: departamentoId
                    };

                }

                if (password) {
                    datos.password = password;
                }

                await actualizarUsuario(
                    editandoUsuarioId,
                    datos
                );

                mostrarMsg(
                    "msgForm",
                    "Usuario actualizado",
                    true
                );

                editandoUsuarioId = null;

                document.getElementById("tituloForm")
                    .textContent = "Registrar Usuario";

                document.getElementById("btnGuardarUsuario")
                    .innerHTML = "+ Registrar Usuario";

            }

            // CREAR
            else {

                if (!password) {

                    mostrarMsg(
                        "msgForm",
                        "La contraseña es requerida",
                        false
                    );

                    return;
                }

                await registrarUsuario(
                    username,
                    password,
                    rol,
                    departamentoId
                );

                mostrarMsg(
                    "msgForm",
                    "Usuario registrado",
                    true
                );

            }

            limpiarFormulario();

            await cargarUsuarios();

        } catch (err) {

            mostrarMsg(
                "msgForm",
                err.message || "Error",
                false
            );

        }

    }

    // EDITAR
    function editarUsuario(usuario) {

        editandoUsuarioId = usuario.id;

        document.getElementById("username").value =
            usuario.username || "";

        document.getElementById("password").value = "";

        document.getElementById("rol").value =
            usuario.rol || "";

        document.getElementById("deptoId").value =
            usuario.departamento?.id || "";

        document.getElementById("tituloForm")
            .textContent = "Editar Usuario";

        document.getElementById("btnGuardarUsuario")
            .innerHTML = "Guardar Cambios";

        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });

    }

    // ELIMINAR
    async function eliminarUsuarioUI(id) {

        const actualId =
            localStorage.getItem("id");

        if (String(id) === String(actualId)) {

            mostrarMsg(
                "msgTabla",
                "No puedes eliminar tu propio usuario",
                false
            );

            return;
        }

        if (!confirm("¿Eliminar usuario?")) {
            return;
        }

        try {

            await eliminarUsuario(id);

            mostrarMsg(
                "msgTabla",
                "Usuario eliminado",
                true
            );

            await cargarUsuarios();

        } catch (err) {

            mostrarMsg(
                "msgTabla",
                err.message || "Error al eliminar",
                false
            );

        }

    }

    // LIMPIAR
    function limpiarFormulario() {

        editandoUsuarioId = null;

        document.getElementById("username").value = "";

        document.getElementById("password").value = "";

        document.getElementById("rol").selectedIndex = 0;

        document.getElementById("deptoId").selectedIndex = 0;

        document.getElementById("tituloForm")
            .textContent = "Registrar Usuario";

        document.getElementById("btnGuardarUsuario")
            .innerHTML = "+ Registrar Usuario";

    }

    // MENSAJES
    function mostrarMsg(id, texto, ok) {

        const el = document.getElementById(id);

        el.textContent = texto;

        el.className =
            "msg " + (ok ? "ok" : "error") + " show";

        setTimeout(() => {

            el.classList.remove("show");

        }, 4000);

    }

    init();

</script>

</body>

</html>
