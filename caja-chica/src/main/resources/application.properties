# Datos de conexi\u00f3n (Aseg\u00farate que el nombre sea igual al que creaste en phpMyAdmin)
spring.datasource.url=jdbc:mysql://localhost:3306/caja_chica
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraci\u00f3n de Hibernate (Esto crear\u00e1 las tablas autom\u00e1ticamente)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect