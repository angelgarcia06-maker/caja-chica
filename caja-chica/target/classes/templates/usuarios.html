<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios — Caja Chica</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header class="navbar">
    <span class="brand">💰 Caja Chica</span>
    <nav id="navLinks"></nav>
    <div style="display:flex;align-items:center;">
        <span class="user-info" id="userLabel"></span>
        <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
    </div>
</header>

<main class="page">
    <h1 class="page-title">Gestión de Usuarios</h1>

    <div class="card">
        <div class="section-header"><h2>Registrar Usuario</h2></div>
        <div id="msgForm" class="msg ok"></div>
        <div class="form-grid">
            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" placeholder="Ej: jperez">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label for="rol">Rol</label>
                <select id="rol">
                    <option value="EMPLEADO">Empleado</option>
                    <option value="ADMIN">Administrador</option>
                </select>
            </div>
            <div class="form-group">
                <label for="deptoId">Departamento</label>
                <select id="deptoId">
                    <option value="">Sin departamento</option>
                </select>
            </div>
        </div>
        <div style="display:flex; gap:.75rem; flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="handleRegistrar()">+ Registrar Usuario</button>
            <button class="btn btn-secondary" onclick="limpiarFormulario()">Limpiar</button>
        </div>
    </div>

    <div class="card">
        <div class="section-header">
            <h2>Usuarios Registrados</h2>
            <button class="btn btn-secondary" onclick="cargarUsuarios()" style="font-size:.8rem; padding:.4rem .9rem;">↻ Actualizar</button>
        </div>
        <div id="msgTabla" class="msg error"></div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Rol</th>
                        <th>Departamento</th>
                    </tr>
                </thead>
                <tbody id="tablaUsuarios">
                    <tr><td colspan="4" style="text-align:center; color:var(--texto-soft); padding:2rem;">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="/js/api.js"></script>
<script>
    if (!localStorage.getItem("token")) window.location.href = "/login";
    const ROL = localStorage.getItem("rol");
    if (ROL !== "ADMIN") window.location.href = "/view/dashboard";

    document.getElementById("userLabel").textContent = localStorage.getItem("username") || "";
    document.getElementById("navLinks").innerHTML = `
        <a href="/view/dashboard">Dashboard</a>
        <a href="/view/gastos">Gastos</a>
        <a href="/view/presupuesto">Presupuesto</a>
        <a href="/view/usuarios" class="active">Usuarios</a>
    `;

    function cerrarSesion() { localStorage.clear(); window.location.href = "/login"; }

    async function init() {
        try {
            const deptos = await listarDepartamentos();
            document.getElementById("deptoId").innerHTML =
                `<option value="">Sin departamento</option>` +
                deptos.map(d => `<option value="${d.id}">${d.nombre}</option>`).join("");
        } catch (err) { mostrarMsg("msgTabla", "Error al cargar departamentos.", false); }
        await cargarUsuarios();
    }

    async function cargarUsuarios() {
        try {
            const usuarios = await listarUsuarios();
            const tbody    = document.getElementById("tablaUsuarios");
            if (!usuarios.length) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--texto-soft); padding:2rem;">No hay usuarios registrados</td></tr>`;
                return;
            }
            tbody.innerHTML = usuarios.map(u => {
                const badge = u.rol === "ADMIN"
                    ? `<span class="badge badge-admin">ADMIN</span>`
                    : `<span class="badge badge-empleado">EMPLEADO</span>`;
                return `
                    <tr>
                        <td style="font-family:monospace; color:var(--texto-soft);">${u.id}</td>
                        <td>${u.username}</td>
                        <td>${badge}</td>
                        <td>${u.departamento?.nombre || "—"}</td>
                    </tr>`;
            }).join("");
        } catch (err) { mostrarMsg("msgTabla", "Error al cargar usuarios.", false); }
    }

    async function handleRegistrar() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const rol      = document.getElementById("rol").value;
        const deptoId  = document.getElementById("deptoId").value;

        if (!username || !password) {
            mostrarMsg("msgForm", "Completa usuario y contraseña.", false); return;
        }
        if (username.length < 3) {
            mostrarMsg("msgForm", "El usuario debe tener al menos 3 caracteres.", false); return;
        }
        if (password.length < 4) {
            mostrarMsg("msgForm", "La contraseña debe tener al menos 4 caracteres.", false); return;
        }
        try {
            await registrarUsuario(username, password, rol, deptoId || null);
            mostrarMsg("msgForm", `Usuario "${username}" registrado correctamente.`, true);
            limpiarFormulario();
            await cargarUsuarios();
        } catch (err) { mostrarMsg("msgForm", "Error al registrar. El usuario ya puede existir.", false); }
    }

    function limpiarFormulario() {
        document.getElementById("username").value        = "";
        document.getElementById("password").value        = "";
        document.getElementById("rol").selectedIndex     = 0;
        document.getElementById("deptoId").selectedIndex = 0;
    }

    function mostrarMsg(id, texto, ok) {
        const el = document.getElementById(id);
        el.textContent = texto;
        el.className = "msg " + (ok ? "ok" : "error") + " show";
        setTimeout(() => el.classList.remove("show"), 4000);
    }

    init();
</script>
</body>
</html>
