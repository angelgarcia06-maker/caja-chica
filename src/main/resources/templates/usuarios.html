<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios — Caja Chica</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <header class="navbar">
        <span class="brand">💰 Caja Chica</span>
        <nav>
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/gastos}">Gastos</a>
            <a th:href="@{/presupuesto}">Presupuesto</a>
            <a th:href="@{/usuarios}" class="active">Usuarios</a>
        </nav>
        <div style="display:flex;align-items:center;">
            <span class="user-info" th:text="${username}"></span>
            <form th:action="@{/logout}" method="post" style="margin:0;">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <button type="submit" class="btn-logout">Salir</button>
            </form>
            </form>
        </div>
    </header>

    <main class="page">
        <h1 class="page-title">Gestión de Usuarios</h1>

        <div th:if="${exito}" class="msg ok show" th:text="${exito}"></div>
        <div th:if="${error}" class="msg error show" th:text="${error}"></div>

        <div class="card">
            <div class="section-header">
                <h2>Registrar Usuario</h2>
            </div>
            <form th:action="@{/usuarios/registrar}" method="post">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="form-grid">
                    <div class="form-group">
                        <label for="username">Nombre de usuario</label>
                        <input type="text" id="username" name="username" placeholder="Ej: jperez" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="rol">Rol</label>
                        <select id="rol" name="rol" required>
                            <option value="EMPLEADO">Empleado</option>
                            <option value="ADMIN">Administrador</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="deptoId">Departamento</label>
                        <select id="deptoId" name="deptoId">
                            <option value="">Sin departamento</option>
                            <option th:each="d : ${departamentos}" th:value="${d.id}" th:text="${d.nombre}"></option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">+ Registrar Usuario</button>
            </form>
        </div>

        <div id="modalEditar"
            style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
            <div class="card" style="width:100%; max-width:500px; margin:1rem;">
                <div class="section-header">
                    <h2>Editar Usuario</h2>
                    <button onclick="cerrarModal()" class="btn btn-secondary"
                        style="font-size:.8rem; padding:.4rem .9rem;">✕ Cerrar</button>
                </div>
                <form id="formEditar" method="post">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nombre de usuario</label>
                            <input type="text" id="editUsername" name="username" required>
                        </div>
                        <div class="form-group">
                            <label>Nueva contraseña <span style="color:var(--texto-soft); font-size:.8rem;">(dejar vacío
                                    para no cambiar)</span></label>
                            <input type="password" id="editPassword" name="password" placeholder="••••••••">
                        </div>
                        <div class="form-group">
                            <label>Rol</label>
                            <select id="editRol" name="rol" required>
                                <option value="EMPLEADO">Empleado</option>
                                <option value="ADMIN">Administrador</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Departamento</label>
                            <select id="editDeptoId" name="deptoId">
                                <option value="">Sin departamento</option>
                                <option th:each="d : ${departamentos}" th:value="${d.id}" th:text="${d.nombre}">
                                </option>
                            </select>
                        </div>
                    </div>
                    <div style="display:flex; gap:.5rem; margin-top:1rem;">
                        <button type="submit" class="btn btn-primary">Guardar cambios</button>
                        <button type="button" onclick="cerrarModal()" class="btn btn-secondary">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="section-header">
                <h2>Usuarios Registrados</h2>
                <a th:href="@{/usuarios}" class="btn btn-secondary" style="font-size:.8rem; padding:.4rem .9rem;">↻
                    Actualizar</a>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Usuario</th>
                            <th>Rol</th>
                            <th>Departamento</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(usuarios)}">
                            <td colspan="5" style="text-align:center; color:var(--texto-soft); padding:2rem;">
                                No hay usuarios registrados
                            </td>
                        </tr>
                        <tr th:each="u : ${usuarios}">
                            <td style="font-family:monospace; color:var(--texto-soft);" th:text="${u.id}"></td>
                            <td th:text="${u.username}"></td>
                            <td>
                                <span th:if="${u.rol == 'ADMIN'}" class="badge badge-admin">ADMIN</span>
                                <span th:unless="${u.rol == 'ADMIN'}" class="badge badge-empleado">EMPLEADO</span>
                            </td>
                            <td th:text="${u.departamento != null} ? ${u.departamento.nombre} : '—'"></td>
                            <td>
                                <div style="display:flex; gap:.4rem;">

                                    <button type="button" class="btn btn-secondary"
                                        style="font-size:.75rem; padding:.3rem .7rem;" th:attr="
                                        data-id=${u.id},
                                        data-username=${u.username},
                                        data-rol=${u.rol},
                                        data-departamento=${u.departamento != null ? u.departamento.id : ''}
                                    " onclick="abrirModalDesdeBoton(this)">
                                        ✏ Editar
                                    </button>

                                    <form th:action="@{/usuarios/{id}/eliminar(id=${u.id})}" method="post"
                                        style="margin:0;" onsubmit="return confirm('¿Eliminar usuario?')">

                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                            th:value="${_csrf.token}" />

                                        <button type="submit" class="btn btn-danger"
                                            style="font-size:.75rem; padding:.3rem .7rem;">
                                            Eliminar
                                        </button>
                                    </form>

                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        function abrirModal(id, username, rol, deptoId) {
            document.getElementById('editUsername').value = username;
            document.getElementById('editPassword').value = '';
            document.getElementById('editRol').value = rol;
            document.getElementById('editDeptoId').value = deptoId || '';
            document.getElementById('formEditar').action = '/usuarios/' + id + '/editar';
            const modal = document.getElementById('modalEditar');
            modal.style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modalEditar').style.display = 'none';
        }

        function abrirModalDesdeBoton(btn) {

            const id = btn.dataset.id;
            const username = btn.dataset.username;
            const rol = btn.dataset.rol;
            const departamento = btn.dataset.departamento;

            abrirModal(id, username, rol, departamento);
        }

        document.getElementById('modalEditar').addEventListener('click', function (e) {
            if (e.target === this) cerrarModal();
        });
    </script>

</body>

</html>
