<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimientos — Caja Chica</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<header class="navbar">
    <span class="brand">💰 Caja Chica</span>
    <nav id="navLinks"></nav>
    <div style="display:flex;align-items:center;">
        <span class="user-info" id="userLabel"></span>
        <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
    </div>
</header>

<main class="page">
    <h1 class="page-title">Movimientos de Caja</h1>
    <div id="msg" class="msg"></div>

    <div class="card" id="cardRegistrarMovimiento">
        <div class="section-header">
            <h2>Registrar Movimiento</h2>
        </div>
        <div class="form-grid">
            <div class="form-group">
                <label for="cajaIdMov">Caja</label>
                <select id="cajaIdMov"></select>
            </div>
            <div class="form-group">
                <label for="tipoMov">Tipo</label>
                <select id="tipoMov">
                    <option value="INGRESO">Ingreso</option>
                    <option value="EGRESO">Egreso</option>
                </select>
            </div>
            <div class="form-group">
                <label for="montoMov">Monto (S/.)</label>
                <input type="number" id="montoMov" placeholder="0.00" min="0.01" step="0.01">
            </div>
            <div class="form-group">
                <label for="descripcionMov">Descripción</label>
                <input type="text" id="descripcionMov" placeholder="Ej: Reembolso, venta, etc.">
            </div>
        </div>
        <button class="btn btn-primary" onclick="registrarMovimiento()">+ Registrar Movimiento</button>
    </div>

    <div class="card">
        <div class="section-header">
            <h2>Historial de Movimientos</h2>
            <div>
                <select id="filtroCaja" onchange="cargarMovimientos()">
                    <option value="">Todas las cajas</option>
                </select>
                <button class="btn btn-secondary" onclick="cargarMovimientos()" style="margin-left:8px;">↻ Actualizar</button>
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Fecha</th>
                        <th>Tipo</th>
                        <th>Monto</th>
                        <th>Descripción</th>
                        <th>Caja / Departamento</th>
                    </tr>
                </thead>
                <tbody id="tablaMovimientos">
                    <tr><td colspan="6" style="text-align:center;padding:3rem;color:var(--texto-soft);">Cargando movimientos...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="/js/api.js"></script>
<script>
    if (!localStorage.getItem("token")) window.location.href = "/login";

    const ROL = localStorage.getItem("rol");
    const DEPTO_ID = localStorage.getItem("departamentoId");
    const USERNAME = localStorage.getItem("username");

    document.getElementById("userLabel").textContent = USERNAME || "";

    document.getElementById("navLinks").innerHTML = `
        <a href="/view/dashboard">Dashboard</a>
        <a href="/view/registrar-gasto">Registrar Gasto</a>
        <a href="/view/gastos">Gastos</a>
        <a href="/view/movimientos" class="active">Movimientos</a>
        ${ROL === "ADMIN" ? '<a href="/view/presupuesto">Presupuesto</a><a href="/view/usuarios">Usuarios</a>' : ''}
    `;

    function cerrarSesion() {
        localStorage.clear();
        window.location.href = "/login";
    }

    async function cargarCajasFiltro() {
        try {
            const cajas = await listarCajas();
            const select = document.getElementById("cajaIdMov");
            const filtroSelect = document.getElementById("filtroCaja");

            let html = `<option value="">Selecciona caja...</option>`;
            let filtroHtml = `<option value="">Todas las cajas</option>`;

            cajas.forEach(c => {
                const depto = c.departamento?.nombre || 'Sin departamento';
                html += `<option value="${c.id}">Caja #${c.id} - ${depto}</option>`;
                filtroHtml += `<option value="${c.id}">Caja #${c.id} - ${depto}</option>`;
            });

            select.innerHTML = html;
            filtroSelect.innerHTML = filtroHtml;
        } catch (e) {
            console.error(e);
        }
    }

    async function registrarMovimiento() {
        const cajaId = document.getElementById("cajaIdMov").value;
        const tipo = document.getElementById("tipoMov").value;
        const monto = document.getElementById("montoMov").value;
        const descripcion = document.getElementById("descripcionMov").value.trim();

        if (!cajaId || !monto || !descripcion) {
            mostrarMsg("Debe completar todos los campos", false);
            return;
        }

        try {
            await registrarMovimientoAPI(cajaId, tipo, monto, descripcion);
            mostrarMsg("Movimiento registrado correctamente", true);
            document.getElementById("montoMov").value = "";
            document.getElementById("descripcionMov").value = "";
            cargarMovimientos();
        } catch (err) {
            mostrarMsg(err.message || "Error al registrar movimiento", false);
        }
    }

    async function cargarMovimientos() {
        try {
            const filtroCajaId = document.getElementById("filtroCaja").value;
            let movimientos = filtroCajaId
                ? await listarMovimientosPorCaja(filtroCajaId)
                : await listarMovimientos();

            if (ROL === "EMPLEADO" && DEPTO_ID) {
                movimientos = movimientos.filter(m => m.cajaChica?.departamento?.id == DEPTO_ID);
            }

            renderMovimientos(movimientos);
        } catch (err) {
            mostrarMsg("Error al cargar movimientos", false);
        }
    }

    function renderMovimientos(movimientos) {
        const tbody = document.getElementById("tablaMovimientos");
        if (!movimientos.length) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:3rem;color:var(--texto-soft);">No hay movimientos registrados.</td></tr>`;
            return;
        }
        tbody.innerHTML = movimientos.map(m => `
            <tr>
                <td style="font-family:monospace;">#${m.id}</td>
                <td>${new Date(m.fecha).toLocaleString('es-PE')}</td>
                <td>
                    <span class="badge ${m.tipo === 'INGRESO' ? 'badge-ingreso' : 'badge-egreso'}">${m.tipo}</span>
                </td>
                <td style="font-weight:600; color:${m.tipo === 'INGRESO' ? 'var(--verde)' : 'var(--rojo)'}">
                    S/. ${parseFloat(m.monto).toFixed(2)}
                </td>
                <td>${m.descripcion}</td>
                <td>${m.cajaChica?.departamento?.nombre || '—'}</td>
            </tr>
        `).join("");
    }

    function mostrarMsg(texto, ok) {
        const msg = document.getElementById("msg");
        msg.textContent = texto;
        msg.className = `msg ${ok ? 'ok' : 'error'} show`;
        setTimeout(() => msg.classList.remove("show"), 5000);
    }

    window.onload = () => {
        cargarCajasFiltro();
        cargarMovimientos();
        if (ROL === "EMPLEADO") {
            document.getElementById("cardRegistrarMovimiento").style.display = "none";
        }
    };
</script>

</body>
</html>
