<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Gasto — Caja Chica</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<header class="navbar">
    <span class="brand">💰 Caja Chica</span>
    <nav>
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/registrar-gasto}" class="active">Registrar Gasto</a>
        <a th:href="@{/gastos}">Mis Gastos</a>
    </nav>
    <div style="display:flex;align-items:center;">
        <span class="user-info" th:text="${username}"></span>
        <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit" class="btn-logout">Salir</button>
        </form>
    </div>
</header>

<main class="page">
    <h1 class="page-title">Registrar Gasto</h1>

    <div th:if="${exito}" class="msg ok show" th:text="${exito}"></div>
    <div th:if="${error}" class="msg error show" th:text="${error}"></div>

    <div class="card">
        <div class="section-header">
            <h2>Nuevo Gasto</h2>
        </div>
        <form th:action="@{/registrar-gasto}" method="post" enctype="multipart/form-data">
            <div class="form-grid" style="margin-bottom:1rem;">
                <div class="form-group">
                    <label>Tu Área</label>
                    <input type="text" th:value="${areaNombre}" readonly
                           style="background:var(--gris-100); cursor:not-allowed;">
                </div>
                <div class="form-group">
                    <label for="cajaId">Caja del Área</label>
                    <select id="cajaId" name="cajaId" required>
                        <option value="" th:if="${#lists.isEmpty(cajas)}">Sin cajas disponibles</option>
                        <option th:each="c : ${cajas}"
                                th:value="${c.id}"
                                th:text="'Caja #' + ${c.id} + ' — Saldo S/. ' + ${#numbers.formatDecimal(c.saldoActual, 1, 2)}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="presupuestoId">Presupuesto del Mes</label>
                    <select id="presupuestoId" name="presupuestoId" required>
                        <option value="" th:if="${#lists.isEmpty(presupuestos)}">Sin presupuesto asignado</option>
                        <option th:each="p : ${presupuestos}"
                                th:value="${p.id}"
                                th:text="${p.mes} + ' — S/. ' + ${#numbers.formatDecimal(p.presupuestoMensual, 1, 2)}"></option>
                    </select>
                </div>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="categoria">Categoría</label>
                    <input type="text" id="categoria" name="categoria"
                           placeholder="Ej: Transporte, Materiales" required>
                </div>
                <div class="form-group">
                    <label for="monto">Monto (S/.)</label>
                    <input type="number" id="monto" name="monto"
                           placeholder="0.00" min="0.01" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <input type="text" id="descripcion" name="descripcion"
                           placeholder="Detalle del gasto" required>
                </div>
                <div class="form-group">
                    <label for="archivo">Comprobante (JPG, PNG, PDF)</label>
                    <input type="file" id="archivo" name="archivo" accept=".jpg,.jpeg,.png,.pdf">
                </div>
            </div>
            <div style="margin-top:1rem;">
                <button type="submit" class="btn btn-primary">+ Registrar Gasto</button>
                <a th:href="@{/registrar-gasto}" class="btn btn-secondary" style="text-decoration:none; margin-left:.5rem;">Limpiar</a>
            </div>
        </form>
    </div>

    <div class="card">
        <div class="section-header">
            <h2>Mis Gastos Recientes</h2>
            <a th:href="@{/gastos}" class="btn btn-secondary"
               style="font-size:.8rem; padding:.4rem .9rem; text-decoration:none;">Ver todos →</a>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Descripción</th>
                        <th>Categoría</th>
                        <th>Monto</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(misGastos)}">
                        <td colspan="5" style="text-align:center; color:var(--texto-soft); padding:2rem;">
                            Sin gastos registrados
                        </td>
                    </tr>
                    <tr th:each="g : ${misGastos}">
                        <td style="font-family:monospace;" th:text="${g.id}"></td>
                        <td th:text="${g.descripcion} ?: '—'"></td>
                        <td th:text="${g.categoria} ?: '—'"></td>
                        <td style="font-family:monospace;" th:text="'S/. ' + ${#numbers.formatDecimal(g.monto, 1, 2)}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${g.estado == 'APROBADO'} ? 'badge-aprobado' : (${g.estado == 'RECHAZADO'} ? 'badge-rechazado' : 'badge-pendiente')"
                                  th:text="${g.estado} ?: 'PENDIENTE'"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

</body>
</html>
