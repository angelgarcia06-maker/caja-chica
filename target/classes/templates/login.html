<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Caja Chica</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

    <div class="login-wrap">
        <div class="login-box">

            <div class="logo">
                💰 Caja <span>Chica</span>
            </div>

            <div class="card">

                <h2 style="margin-bottom:1.5rem; font-size:1.1rem; color:var(--gris-900);">
                    Iniciar Sesión
                </h2>

                <div id="msg" class="msg error"></div>

                <div class="form-group" style="margin-bottom:1rem;">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" autocomplete="username">
                </div>

                <div class="form-group" style="margin-bottom:1.5rem;">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                </div>

                <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="handleLogin()">

                    Ingresar

                </button>

            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>

    <script>

        // Limpiar tokens corruptos
        const token = localStorage.getItem("token");

        // Si token inválido → limpiar
        if (
            token === "undefined" ||
            token === "null"
        ) {
            localStorage.clear();
        }

        // Enter para login
        document
            .getElementById("password")
            .addEventListener("keydown", function (e) {

                if (e.key === "Enter") {
                    handleLogin();
                }

            });

        // LOGIN
        async function handleLogin() {

            const username = document
                .getElementById("username")
                .value
                .trim();

            const password = document
                .getElementById("password")
                .value
                .trim();

            const msg = document.getElementById("msg");

            msg.classList.remove("show");

            // Validación
            if (!username || !password) {

                msg.textContent =
                    "Por favor completa todos los campos.";

                msg.classList.add("show");

                return;
            }

            try {

                const data = await login(username, password);

                localStorage.setItem("token", data.token);
                localStorage.setItem("username", data.username || username);
                localStorage.setItem("rol", data.rol);
                localStorage.setItem("id", data.id || "");
                localStorage.setItem("departamentoId", data.departamentoId || "");
                localStorage.setItem("departamentoNombre", data.departamentoNombre || "");


                window.location.href = "/view/dashboard";

            } catch (err) {

                msg.textContent =
                    err.message || "Error al iniciar sesión.";

                msg.classList.add("show");
            }
        }

    </script>



</body>

</html>
