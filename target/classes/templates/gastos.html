<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos — Caja Chica</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<header class="navbar">
    <span class="brand">💰 Caja Chica</span>
    <nav id="navLinks"></nav>
    <div style="display:flex;align-items:center;">
        <span class="user-info" id="userLabel"></span>
        <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
    </div>
</header>

<main class="page">
    <h1 class="page-title" id="tituloGastos">Gastos</h1>

    <div class="card">
        <div class="section-header">
            <h2 id="tituloTabla">Lista de Gastos</h2>
            <button class="btn btn-secondary" onclick="cargarGastos()" style="font-size:.8rem; padding:.4rem .9rem;">↻ Actualizar</button>
        </div>
        <div id="msgTabla" class="msg error"></div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Fecha</th>
                        <th>Empleado</th>
                        <th>Departamento</th>
                        <th>Descripción</th>
                        <th>Categoría</th>
                        <th>Monto</th>
                        <th>Estado</th>
                        <th id="thAcciones" style="display:none;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaGastos">
                    <tr>
                        <td colspan="7" style="text-align:center; color:var(--texto-soft); padding:2rem;">Cargando...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="/js/api.js"></script>
<script>
    if (!localStorage.getItem("token")) window.location.href = "/login";

    const ROL = localStorage.getItem("rol");
    const USUARIO_ID = localStorage.getItem("id");
    const DEPTO_ID = localStorage.getItem("departamentoId");

    document.getElementById("userLabel").textContent = localStorage.getItem("username") || "";

    document.getElementById("navLinks").innerHTML = `
        <a href="/view/dashboard">Dashboard</a>
        ${ROL === "EMPLEADO" ? '<a href="/view/registrar-gasto">Registrar Gasto</a>' : ''}
        <a href="/view/gastos" class="active">Gastos</a>
        ${ROL === "ADMIN" ? '<a href="/view/presupuesto">Presupuesto</a><a href="/view/usuarios">Usuarios</a>' : ''}
    `;

    function cerrarSesion() {
        localStorage.clear();
        window.location.href = "/login";
    }

    async function init() {
        if (ROL === "EMPLEADO") {
            document.getElementById("tituloGastos").textContent = "Mis Gastos";
            document.getElementById("tituloTabla").textContent = "Mis Gastos Registrados";
        }
        if (ROL === "ADMIN") {
            document.getElementById("thAcciones").style.display = "table-cell";
        }
        await cargarGastos();
    }

    async function cargarGastos() {
        try {
            let gastos = ROL === "ADMIN"
                ? await listarGastos()
                : await listarMisGastos(USUARIO_ID);
            renderGastos(gastos);
        } catch (err) {
            mostrarMsg("msgTabla", "No se pudieron cargar los gastos.", false);
        }
    }

    function renderGastos(lista) {
        const tbody = document.getElementById("tablaGastos");
        const cols = ROL === "ADMIN" ? 7 : 6;
        if (!lista.length) {
            tbody.innerHTML = `<tr><td colspan="${cols}" style="text-align:center; color:var(--texto-soft); padding:2rem;">Sin gastos registrados</td></tr>`;
            return;
        }
        tbody.innerHTML = lista.map(g => {
            const fecha = g.fecha ? new Date(g.fecha).toLocaleString("es-PE") : "—";
            const estado = g.estado || "PENDIENTE";
            const badge = estado === "APROBADO" ? "badge-aprobado" : estado === "RECHAZADO" ? "badge-rechazado" : "badge-pendiente";
            const acciones = ROL === "ADMIN"
                ? estado === "PENDIENTE"
                    ? `<td style="display:flex; gap:.4rem;">
                        <button class="btn btn-success" style="font-size:.75rem; padding:.3rem .7rem;" onclick="handleAprobar(${g.id})">✓ Aprobar</button>
                        <button class="btn btn-danger" style="font-size:.75rem; padding:.3rem .7rem;" onclick="handleRechazar(${g.id})">✗ Rechazar</button>
                       </td>`
                    : `<td style="color:var(--texto-soft); font-size:.85rem; text-align:center;">—</td>`
                : "";
            return `
                    <tr>
                        <td style="font-family:monospace; color:var(--texto-soft);">${g.id}</td>
                        <td style="font-size:.85rem;">${fecha}</td>
                        <td>${g.usuario?.username || "—"}</td>
                        <td>${g.usuario?.departamento?.nombre || "—"}</td>
                        <td>${g.descripcion || "—"}</td>
                        <td>${g.categoria || "—"}</td>
                        <td style="font-family:monospace;">S/. ${parseFloat(g.monto||0).toFixed(2)}</td>
                        <td><span class="badge ${badge}">${estado}</span></td>
                        ${acciones}
                </tr>`;
        }).join("");
    }

    async function handleAprobar(id) {
        try {
            await aprobarGasto(id);
            mostrarMsg("msgTabla", "Gasto aprobado correctamente.", true);
            await cargarGastos();
        } catch (err) {
            mostrarMsg("msgTabla", "No se pudo aprobar el gasto.", false);
        }
    }

    async function handleRechazar(id) {
        try {
            await rechazarGasto(id);
            mostrarMsg("msgTabla", "Gasto rechazado.", true);
            await cargarGastos();
        } catch (err) {
            mostrarMsg("msgTabla", "No se pudo rechazar el gasto.", false);
        }
    }

    function mostrarMsg(id, texto, ok) {
        const el = document.getElementById(id);
        el.textContent = texto;
        el.className = "msg " + (ok ? "ok" : "error") + " show";
        setTimeout(() => el.classList.remove("show"), 4000);
    }

    init();
</script>

</body>
</html>
